<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ramsey Skipper</title>
<style>
  :root {
    --bg: #0f1216;
    --panel: #171c22;
    --panel-2: #1f262e;
    --line: #2b333c;
    --text: #e8edf2;
    --muted: #9aa7b2;
    --accent: #f5a623;
    --accent-2: #2e7d32;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; }
  header h1 .skip { color: var(--accent); }
  header .sub { color: var(--muted); font-size: 13px; }
  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 18px;
    padding: 18px 20px 28px;
    align-items: start;
  }
  @media (max-width: 920px) { .layout { grid-template-columns: 1fr; } }

  .stage { min-width: 0; }
  .video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  .now {
    margin-top: 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .now .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
  .now .title { font-size: 17px; font-weight: 600; margin: 4px 0 2px; }
  .now .reason { color: var(--muted); font-size: 13px; }
  .now .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }

  .controls {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 9px 13px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { border-color: #3c4753; background: #242c35; }
  button.primary { background: var(--accent); color: #1a1205; border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .4; cursor: default; }
  .toggle {
    display: inline-flex; align-items: center; gap: 7px;
    color: var(--muted); font-size: 13px; margin-left: auto;
    user-select: none; cursor: pointer;
  }
  .toggle input { accent-color: var(--accent); width: 16px; height: 16px; }

  .progress {
    margin-top: 12px; height: 6px; border-radius: 4px;
    background: var(--panel-2); overflow: hidden; position: relative;
  }
  .progress > span { position: absolute; inset: 0 100% 0 0; background: var(--accent); }

  aside {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    max-height: calc(100vh - 120px);
    overflow: auto;
    position: sticky;
    top: 18px;
  }
  aside .head {
    padding: 12px 14px; border-bottom: 1px solid var(--line);
    color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
    position: sticky; top: 0; background: var(--panel);
  }
  .seg {
    display: flex; gap: 10px; padding: 11px 14px; cursor: pointer;
    border-bottom: 1px solid var(--line);
  }
  .seg:hover { background: var(--panel-2); }
  .seg.active { background: #20262d; box-shadow: inset 3px 0 0 var(--accent); }
  .seg .idx {
    flex: 0 0 auto; width: 22px; height: 22px; border-radius: 50%;
    background: var(--panel-2); color: var(--muted);
    display: grid; place-items: center; font-size: 12px; margin-top: 1px;
  }
  .seg.active .idx { background: var(--accent); color: #1a1205; }
  .seg .body { min-width: 0; }
  .seg .t { font-weight: 600; font-size: 14px; }
  .seg .meta { color: var(--muted); font-size: 12px; }

  .empty {
    margin: 40px auto; max-width: 640px; text-align: center; color: var(--muted);
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 28px;
  }
  .empty code { color: var(--accent); background: #00000033; padding: 2px 6px; border-radius: 5px; }
  kbd {
    background: var(--panel-2); border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 5px; padding: 1px 6px; font-size: 12px;
  }
</style>
</head>
<body>
<header>
  <h1>Ramsey&nbsp;<span class="skip">Skipper</span></h1>
  <span class="sub" id="sourceSub"></span>
</header>

<div id="app"></div>

<!-- segment data generated by run.py -->
<script src="./data.js"></script>
<script>
(function () {
  "use strict";

  var app = document.getElementById("app");
  var DATA = window.RAMSEY;

  if (!DATA || !DATA.videoId || !DATA.segments || !DATA.segments.length) {
    app.innerHTML =
      '<div class="empty">' +
      '<h2>No episode loaded yet</h2>' +
      '<p>Run the script with a Dave Ramsey Full Show URL, then this page ' +
      'will play just the substantive parts:</p>' +
      '<p><code>python run.py "https://youtu.be/G8syrOa_6Y0"</code></p>' +
      '<p>It writes <code>data.js</code> next to this file and reopens the player.</p>' +
      '</div>';
    return;
  }

  var segments = DATA.segments;
  document.getElementById("sourceSub").textContent =
    segments.length + " segments kept" +
    (DATA.sourceUrl ? " · " + DATA.sourceUrl : "");

  // ----- layout -----
  app.innerHTML =
    '<div class="layout">' +
      '<div class="stage">' +
        '<div class="video-wrap"><div id="ytplayer"></div></div>' +
        '<div class="now">' +
          '<div class="label">Now playing · <span id="counter"></span></div>' +
          '<div class="title" id="nowTitle"></div>' +
          '<div class="reason" id="nowReason"></div>' +
          '<div class="meta" id="nowMeta"></div>' +
        '</div>' +
        '<div class="progress"><span id="segBar"></span></div>' +
        '<div class="controls">' +
          '<button id="prev">⏮ Prev</button>' +
          '<button id="back15">⟲ 15s</button>' +
          '<button id="play" class="primary">⏸ Pause</button>' +
          '<button id="fwd15">15s ⟳</button>' +
          '<button id="next">Next ⏭</button>' +
          '<button id="replay">↻ Replay segment</button>' +
          '<label class="toggle"><input type="checkbox" id="auto" checked> ' +
            'Auto-skip to next</label>' +
        '</div>' +
        '<div class="meta" style="color:var(--muted);font-size:12px;margin-top:10px">' +
          '<kbd>←</kbd>/<kbd>→</kbd> prev/next · <kbd>space</kbd> play/pause · ' +
          'turn off Auto-skip to keep watching past a segment for more context.' +
        '</div>' +
      '</div>' +
      '<aside><div class="head">Segments</div><div id="list"></div></aside>' +
    '</div>';

  // ----- segment list -----
  var listEl = document.getElementById("list");
  segments.forEach(function (s, i) {
    var div = document.createElement("div");
    div.className = "seg";
    div.dataset.i = i;
    div.innerHTML =
      '<div class="idx">' + (i + 1) + '</div>' +
      '<div class="body">' +
        '<div class="t">' + escapeHtml(s.title) + '</div>' +
        '<div class="meta">' + fmt(s.start) + '–' + fmt(s.end) +
          ' · ' + Math.round(s.end - s.start) + 's' +
          (s.reason ? ' · ' + escapeHtml(s.reason) : '') + '</div>' +
      '</div>';
    div.addEventListener("click", function () { goTo(i, true); });
    listEl.appendChild(div);
  });

  // ----- YouTube IFrame API -----
  var player = null;
  var current = 0;
  var ready = false;
  var ticker = null;

  var tag = document.createElement("script");
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player("ytplayer", {
      videoId: DATA.videoId,
      playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
      events: {
        onReady: function () {
          ready = true;
          goTo(0, true);
          ticker = setInterval(tick, 250);
        },
        onStateChange: function (e) {
          if (e.data === YT.PlayerState.PLAYING) setPlayLabel(true);
          if (e.data === YT.PlayerState.PAUSED) setPlayLabel(false);
        }
      }
    });
  };

  function tick() {
    if (!ready || !player.getCurrentTime) return;
    var t = player.getCurrentTime();
    var seg = segments[current];
    // progress within the current segment
    var frac = Math.max(0, Math.min(1, (t - seg.start) / (seg.end - seg.start)));
    document.getElementById("segBar").style.right = (100 - frac * 100) + "%";

    var auto = document.getElementById("auto").checked;
    if (auto && t >= seg.end - 0.15) {
      if (current < segments.length - 1) {
        goTo(current + 1, true);
      } else {
        player.pauseVideo();
      }
    }
  }

  function goTo(i, autoplay) {
    if (i < 0 || i >= segments.length) return;
    current = i;
    var seg = segments[i];
    if (ready) {
      player.seekTo(seg.start, true);
      if (autoplay) player.playVideo();
    }
    render();
  }

  function render() {
    var seg = segments[current];
    document.getElementById("counter").textContent =
      (current + 1) + " / " + segments.length;
    document.getElementById("nowTitle").textContent = seg.title;
    document.getElementById("nowReason").textContent = seg.reason || "";
    document.getElementById("nowMeta").textContent =
      fmt(seg.start) + "–" + fmt(seg.end) + "  (" + Math.round(seg.end - seg.start) + "s)";
    document.getElementById("prev").disabled = current === 0;
    document.getElementById("next").disabled = current === segments.length - 1;

    var items = listEl.querySelectorAll(".seg");
    items.forEach(function (el, i) {
      el.classList.toggle("active", i === current);
    });
    var activeEl = items[current];
    if (activeEl) activeEl.scrollIntoView({ block: "nearest" });
  }

  function setPlayLabel(playing) {
    document.getElementById("play").textContent = playing ? "⏸ Pause" : "▶ Play";
  }

  // ----- controls -----
  document.getElementById("prev").addEventListener("click", function () { goTo(current - 1, true); });
  document.getElementById("next").addEventListener("click", function () { goTo(current + 1, true); });
  document.getElementById("replay").addEventListener("click", function () { goTo(current, true); });
  document.getElementById("back15").addEventListener("click", function () { seekBy(-15); });
  document.getElementById("fwd15").addEventListener("click", function () { seekBy(15); });
  document.getElementById("play").addEventListener("click", function () {
    if (!ready) return;
    var st = player.getPlayerState();
    if (st === YT.PlayerState.PLAYING) player.pauseVideo();
    else player.playVideo();
  });

  function seekBy(delta) {
    if (!ready) return;
    // Manual scrubbing implies "I want more context" — pause auto-skip so the
    // boundary doesn't immediately yank you to the next segment.
    if (delta > 0) document.getElementById("auto").checked = false;
    player.seekTo(Math.max(0, player.getCurrentTime() + delta), true);
    player.playVideo();
  }

  document.addEventListener("keydown", function (e) {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "ArrowLeft") { goTo(current - 1, true); e.preventDefault(); }
    else if (e.key === "ArrowRight") { goTo(current + 1, true); e.preventDefault(); }
    else if (e.key === " ") {
      if (ready) {
        var st = player.getPlayerState();
        if (st === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo();
      }
      e.preventDefault();
    }
  });

  // ----- helpers -----
  function fmt(sec) {
    sec = Math.floor(sec);
    var h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    var mm = (h ? String(m).padStart(2, "0") : String(m));
    return (h ? h + ":" : "") + mm + ":" + String(s).padStart(2, "0");
  }
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
})();
</script>
</body>
</html>
